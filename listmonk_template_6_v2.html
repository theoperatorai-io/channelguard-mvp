<!doctype html>
<html lang="en">
<head>
<title>{{ .Campaign.Subject }}</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="supported-color-schemes" content="light">
<style>
  body {
    background: #FAFAF7;
    color: #0A0A0A;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.7;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: #FAFAF7;
  }
  .header {
    background: #FAFAF7;
    padding: 32px 24px 18px;
    text-align: center;
    border-bottom: 1px solid #E6E6E1;
  }
  .brand {
    font-family: 'Instrument Serif', Georgia, "Times New Roman", serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: #0A0A0A;
    margin: 0;
    white-space: nowrap;
  }
  .brand .accent { color: #FF5A1F; }
  .tagline {
    color: #5B6470;
    font-size: 13px;
    margin: 6px 0 0;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
  }
  .wrap {
    background: #FFFFFF;
    padding: 36px 28px;
  }
  .wrap h1 {
    font-family: 'Instrument Serif', Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.15;
    letter-spacing: -0.015em;
    margin: 0 0 16px;
    color: #0A0A0A;
  }
  .wrap h2 {
    font-family: 'Instrument Serif', Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: 22px;
    line-height: 1.25;
    margin: 28px 0 10px;
    color: #0A0A0A;
  }
  .wrap h3 {
    font-weight: 600;
    font-size: 17px;
    margin: 22px 0 8px;
    color: #0A0A0A;
  }
  .wrap p { margin: 0 0 16px; }
  .wrap ul, .wrap ol { margin: 0 0 16px 20px; padding: 0; }
  .wrap li { margin-bottom: 6px; }
  .wrap a {
    color: #FF5A1F;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .wrap strong { color: #0A0A0A; font-weight: 600; }
  .wrap blockquote {
    border-left: 3px solid #FF5A1F;
    margin: 16px 0;
    padding: 4px 0 4px 16px;
    color: #5B6470;
    font-style: italic;
  }
  .wrap code {
    background: #F5F5F0;
    border: 1px solid #E6E6E1;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 14px;
  }
  .cta { text-align: center; margin: 28px 0 8px; }
  .cta a {
    background: #FF5A1F;
    color: #FFFFFF !important;
    padding: 12px 28px;
    border-radius: 6px;
    font-weight: 500;
    text-decoration: none !important;
    display: inline-block;
    font-size: 15px;
  }
  .footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: #5B6470;
    background: #FAFAF7;
    border-top: 1px solid #E6E6E1;
  }
  .footer a {
    color: #5B6470;
    text-decoration: none;
    margin: 0 8px;
  }
  @media (max-width: 600px) {
    .wrap { padding: 24px 18px; }
    .wrap h1 { font-size: 26px; }
    .header { padding: 28px 18px 16px; }
    .brand { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <p class="brand">the<span class="accent">operator</span>ai</p>
    <p class="tagline">Practical AI workflows for solo operators</p>
  </div>
  <div class="wrap">
    {{ template "content" . }}
  </div>
  <div class="footer">
    <p><a href="{{ UnsubscribeURL }}">Unsubscribe</a> &middot; <a href="{{ MessageURL }}">View in browser</a></p>
    <p>&copy; 2026 The Operator AI &middot; Built by an operator</p>
    {{ TrackView }}
  </div>
</div>
</body>
</html>
